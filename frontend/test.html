<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
</head>
<body>
    <h1>Test JavaScript Loading</h1>
    <button onclick="testLogout()">Test Logout</button>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script src="js/api.js"></script>
    <script>
        console.log('✅ test.html script loaded');
        
        function testLogout() {
            console.log('🔵 testLogout called');
            alert('Logout test clicked!');
        }
        
        function testAPI() {
            console.log('🔵 testAPI called');
            if (typeof DeliveryAPI !== 'undefined') {
                alert('✅ DeliveryAPI class is loaded!');
                const api = new DeliveryAPI();
                alert('✅ DeliveryAPI instantiated successfully!');
                document.getElementById('result').innerHTML = '<p style="color: green;">✅ API loaded successfully!</p>';
            } else {
                alert('❌ DeliveryAPI is NOT loaded!');
                document.getElementById('result').innerHTML = '<p style="color: red;">❌ API NOT loaded!</p>';
            }
        }
    </script>
</body>
</html>
