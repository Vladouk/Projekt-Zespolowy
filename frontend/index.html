<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Delivery Manager - система управління доставками для курйерів">
    <meta name="theme-color" content="#007BFF">
    
    <title>Delivery Manager - Управління доставками</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Delivery Manager">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📦 Delivery Manager</h1>
            <p class="subtitle">Система управління доставками</p>
            <div class="user-info" id="userInfo" style="display: none; margin-top: 10px; color: white;">
                👤 <span id="username"></span> <span id="role" class="badge"></span>
                <button onclick="logout()" class="btn-logout">Вихід</button>
            </div>
        </header>

        <!-- Status indicator -->
        <div class="status-indicator">
            <span id="connectionStatus" class="status-dot online"></span>
            <span id="statusText">Онлайн</span>
        </div>

        <!-- Add Order Section -->
        <section class="add-order-section">
            <h2>➕ Додати нове замовлення</h2>
            <form id="addOrderForm" class="order-form">
                <input 
                    type="text" 
                    id="addressInput" 
                    placeholder="Адреса доставки" 
                    required
                    class="form-input"
                >
                <select id="statusSelect" class="form-input">
                    <option value="нове">🆕 Нове</option>
                    <option value="в дорозі">🚗 В дорозі</option>
                    <option value="доставлено">✅ Доставлено</option>
                    <option value="скасовано">❌ Скасовано</option>
                </select>
                <button type="submit" class="btn btn-primary">Додати замовлення</button>
            </form>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <h2>🔍 Фільтр</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="все">Всі</button>
                <button class="filter-btn" data-filter="нове">Нові</button>
                <button class="filter-btn" data-filter="в дорозі">В дорозі</button>
                <button class="filter-btn" data-filter="доставлено">Доставлені</button>
            </div>
        </section>

        <!-- Orders List -->
        <section class="orders-section">
            <h2>📋 Замовлення</h2>
            <div id="ordersList" class="orders-list">
                <p class="empty-state">Немає замовлень. Додайте своє першу!</p>
            </div>
        </section>

        <!-- Sync Status -->
        <section class="sync-section">
            <button id="syncBtn" class="btn btn-secondary">🔄 Синхронізація</button>
            <p id="syncStatus" class="sync-status"></p>
        </section>
    </div>

    <!-- Scripts -->
    <script src="js/offline.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker зареєстрований'))
                    .catch(err => console.error('❌ Помилка реєстрації:', err));
            });
        }
    </script>
    
    <!-- Scripts for app functionality -->
    <script src="js/logout.js"></script>
</body>
</html>
