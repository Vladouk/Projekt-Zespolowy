<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Delivery Manager - Logowanie">
    
    <title>Logowanie - Delivery Manager</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #333;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }

        .message.error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .demo-info {
            background-color: #f0f4ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>📦</h1>
                <h1>Delivery Manager</h1>
                <p>Profesjonalny System Dostarczania</p>
            </div>

            <div class="demo-info">
                <strong>Konta Demo:</strong><br>
                👤 <code>admin</code> / 🔑 <code>admin123</code><br>
                (wersja mobilna)
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Nazwa Użytkownika</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Wprowadź nazwę użytkownika"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Wprowadź hasło"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    Zaloguj
                </button>
            </form>

            <div id="message" class="message"></div>

            <div class="register-link">
                Nie masz konta? <a href="#" onclick="toggleRegister(event)">Zarejestruj się</a>
            </div>

            <!-- REGISTER FORM -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label for="reg-username">Nazwa Użytkownika</label>
                    <input 
                        type="text" 
                        id="reg-username" 
                        placeholder="Wybierz nazwę użytkownika"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input 
                        type="email" 
                        id="reg-email" 
                        placeholder="Wprowadź email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="reg-password">Hasło</label>
                    <input 
                        type="password" 
                        id="reg-password" 
                        placeholder="Wprowadź hasło"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="reg-role">Rola</label>
                    <select id="reg-role">
                        <option value="user">Klient</option>
                        <option value="courier">Kurier</option>
                    </select>
                </div>

                <button type="submit" class="login-btn" id="submitRegBtn">
                    Zarejestruj
                </button>
            </form>

            <div id="reg-message" class="message"></div>

            <div class="register-link" id="backToLogin" style="display: none;">
                Masz już konto? <a href="#" onclick="toggleRegister(event)">Zaloguj się</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Налаштування локального зберігання токена
        const getToken = () => localStorage.getItem('auth_token');
        const setToken = (token) => localStorage.setItem('auth_token', token);
        const removeToken = () => localStorage.removeItem('auth_token');
        
        // Перевірити чи вже залогінений - тільки якщо є токен І користувач
        const token = getToken();
        const user = localStorage.getItem('current_user');
        if (token && user) {
            try {
                JSON.parse(user); // Спроба парсити юзера
                window.location.href = 'index.html';
            } catch (e) {
                // Якщо не можна парсити - залишитися на логіні
                removeToken();
            }
        }

        // Форма логіну
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Logowanie...';
            message.className = 'message';
            message.textContent = '';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Błąd logowania');
                }

                // Zapisz token
                setToken(data.access_token);
                
                // Zapisz informacje o użytkowniku
                if (data.user) {
                    localStorage.setItem('current_user', JSON.stringify(data.user));
                }

                message.className = 'message success';
                message.textContent = '✅ Sukces! Przekierowywanie...';

                // Przekieruj
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);

            } catch (error) {
                message.className = 'message error';
                message.textContent = `❌ ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Zaloguj';
            }
        });

        // Formularz rejestracji
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;
            const submitBtn = document.getElementById('submitRegBtn');
            const message = document.getElementById('reg-message');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Rejestracja...';
            message.className = 'message';
            message.textContent = '';

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Błąd rejestracji');
                }

                message.className = 'message success';
                message.textContent = '✅ Rejestracja pomyślna! Przekierowywanie na logowanie...';

                setTimeout(() => {
                    toggleRegister(e);
                }, 1500);

            } catch (error) {
                message.className = 'message error';
                message.textContent = `❌ ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Zarejestruj';
            }
        });

        function toggleRegister(e) {
            e.preventDefault();
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const backToLogin = document.getElementById('backToLogin');
            const registerLink = document.querySelector('.register-link');

            if (loginForm.style.display === 'none') {
                // Powrót do logowania
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                registerLink.style.display = 'block';
                backToLogin.style.display = 'none';
                document.getElementById('message').textContent = '';
                document.getElementById('reg-message').textContent = '';
            } else {
                // Przejście do rejestracji
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerLink.style.display = 'none';
                backToLogin.style.display = 'block';
                document.getElementById('message').textContent = '';
                document.getElementById('reg-message').textContent = '';
            }
        }
    </script>
</body>
</html>
