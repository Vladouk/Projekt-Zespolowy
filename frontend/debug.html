<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Debug Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        
        h1 {
            color: #00ffff;
            margin-bottom: 20px;
        }
        
        .console {
            background: #000;
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        .log-line {
            margin: 5px 0;
            padding: 5px;
        }
        
        .info { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffff00; }
        .success { color: #00ff00; }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00ffff;
        }
    </style>
</head>
<body>
    <h1>🔧 Debug Console</h1>
    
    <div class="console" id="console"></div>
    
    <button onclick="testAPI()">Test API Class</button>
    <button onclick="testLogout()">Test Logout</button>
    <button onclick="checkLocalStorage()">Check Storage</button>
    <button onclick="clearConsole()">Clear Console</button>

    <script src="js/api.js"></script>
    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(type, message) {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        function clearConsole() {
            consoleDiv.innerHTML = '';
        }
        
        // Intercept console methods
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            log('info', args.join(' '));
            originalLog.apply(console, args);
        };
        
        console.error = function(...args) {
            log('error', args.join(' '));
            originalError.apply(console, args);
        };
        
        // Initial logs
        log('info', '✅ Debug console initialized');
        log('info', '📄 Page URL: ' + window.location.href);
        
        function testAPI() {
            log('info', '🔵 Testing API class...');
            
            if (typeof DeliveryAPI !== 'undefined') {
                log('success', '✅ DeliveryAPI class found!');
                try {
                    const api = new DeliveryAPI();
                    log('success', '✅ DeliveryAPI instantiated successfully!');
                    log('info', '   API Base: ' + api.apiBase);
                    log('info', '   Token: ' + (api.token ? '✅ Present' : '❌ Missing'));
                } catch (error) {
                    log('error', '❌ Error creating API: ' + error.message);
                }
            } else {
                log('error', '❌ DeliveryAPI class NOT FOUND!');
                log('warning', '⚠️  Check if api.js loaded correctly');
            }
        }
        
        function testLogout() {
            log('info', '🔵 Testing logout function...');
            if (typeof logout !== 'undefined') {
                log('success', '✅ logout function found!');
            } else {
                log('error', '❌ logout function NOT FOUND!');
            }
        }
        
        function checkLocalStorage() {
            log('info', '🔵 Checking localStorage...');
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('current_user');
            
            log('info', 'auth_token: ' + (token ? '✅ Present (' + token.length + ' chars)' : '❌ Missing'));
            log('info', 'current_user: ' + (user ? '✅ Present' : '❌ Missing'));
            
            if (user) {
                try {
                    const userObj = JSON.parse(user);
                    log('info', '  - username: ' + userObj.username);
                    log('info', '  - role: ' + userObj.role);
                } catch (e) {
                    log('error', '  - Error parsing user: ' + e.message);
                }
            }
        }
        
        // Auto-test on load
        setTimeout(() => {
            testAPI();
            checkLocalStorage();
        }, 500);
    </script>
</body>
</html>
